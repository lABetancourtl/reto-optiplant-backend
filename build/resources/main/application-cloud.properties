spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# En cloud normalmente se desactivan seeders para no contaminar datos productivos
app.seed.catalog.enabled=${APP_SEED_CATALOG:false}
app.seed.inventory.enabled=${APP_SEED_INVENTORY:false}
app.seed.sales-history.enabled=${APP_SEED_SALES_HISTORY:false}

