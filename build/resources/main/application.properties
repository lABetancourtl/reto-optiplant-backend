spring.application.name=backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Tiempo maximo para cambios/devoluciones desde la fecha de venta
app.returns.max-hours=72

# Siembra inicial de categorias/productos para ambiente local
app.seed.catalog.enabled=false

# Siembra inicial de inventario por sucursal
app.seed.inventory.enabled=false

# Siembra de ventas historicas para analiticas (varios meses por sucursal)
app.seed.sales-history.enabled=false
app.seed.sales-history.only-if-no-sales=true
app.seed.sales-history.months-back=8
app.seed.sales-history.min-sales-per-month=8
app.seed.sales-history.max-sales-per-month=20
app.seed.sales-history.min-items-per-sale=1
app.seed.sales-history.max-items-per-sale=4
app.seed.sales-history.min-quantity-per-item=1
app.seed.sales-history.max-quantity-per-item=8
